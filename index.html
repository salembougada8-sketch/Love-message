<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>lik inti❤️</title>

<style>
html, body {
    height: 100%;
    margin: 0;
}

body {
    font-family: Arial;
    text-align: center;

    width: 100%;
    min-height: 100vh;

    background: url("https://raw.githubusercontent.com/salembougada8-sketch/Love-message/main/IMG_20260426_144346_247.webp") no-repeat center center fixed;
    background-size: cover;

    color: white;
    overflow-x: hidden;
}

body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
    top: 0;
    left: 0;
    z-index: 0;
}

.container {
    margin-top: 100px;
    position: relative;
    z-index: 1;
}

button {
    padding: 12px 25px;
    border: none;
    border-radius: 20px;
    font-size: 18px;
    background: white;
    color: #ff4d6d;
    cursor: pointer;
}

.message {
    margin-top: 30px;
    font-size: 22px;
    min-height: 100px;
}

.heart {
    position: absolute;
    color: pink;
    animation: float 5s linear infinite;
    z-index: 1;
}

@keyframes float {
    0% {transform: translateY(0);}
    100% {transform: translateY(-800px);}
}
</style>
</head>

<body>

<!-- 🎵 الأغنية -->
<audio id="music" loop>
    <source src="https://files.catbox.moe/i2orns.mp3" type="audio/mpeg">
</audio>

<div class="container">
    <h1>ila ajmal inssana fi 7yati ❤️</h1>
    <button onclick="nextMessage()">inzil lina ya ro7i 💌</button>
    <div class="message" id="msg"></div>
</div>

<script>
let messages = [
" na3ref illi inti ta3ba barcha ama sada9ni ta3bik hatha ilkol bech iwali far7a❤️",
"inti 9wiya akther milli tetssawer 💪",
"ani mo2min bik ya ro7i illi inti bech tenja7 🌹",
"wa3d mini inhar nja7ik injik w nifra7lik ya bb ❤️",
"n7ibik w dima m3ak mahma issir 💖"
];

let i = 0;
let music = document.getElementById("music");

function nextMessage() {
    document.getElementById("msg").innerHTML = messages[i];

    // 🔥 تشغيل الأغنية عند الضغط
    music.play();

    i++;

    if (i >= messages.length) {
        i = 0;
    }
}

/* ❤️ قلوب */
setInterval(() => {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "❤️";
    heart.style.left = Math.random() * window.innerWidth + "px";
    heart.style.top = "100%";
    heart.style.fontSize = (Math.random() * 20 + 20) + "px";
    document.body.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 5000);
}, 500);
</script>

</body>
</html>
